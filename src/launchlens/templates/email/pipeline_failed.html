<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1E293B;">
  <div style="background: #DC2626; color: white; padding: 24px; border-radius: 8px 8px 0 0; text-align: center;">
    <h1 style="margin: 0; font-size: 24px;">Pipeline Issue</h1>
  </div>
  <div style="background: #F8FAFC; padding: 24px; border: 1px solid #E2E8F0; border-top: none; border-radius: 0 0 8px 8px;">
    <p>We encountered an issue processing your listing at <strong>{{address}}</strong>.</p>
    <div style="background: #FEF2F2; border: 1px solid #FECACA; padding: 12px 16px; border-radius: 6px; margin: 16px 0;">
      <p style="margin: 0; color: #991B1B; font-size: 14px;"><strong>Error:</strong> {{error}}</p>
    </div>
    <p>Our team has been notified. You can try re-uploading your photos or contact support if the issue persists.</p>
    <p style="color: #64748B; font-size: 14px;">— The LaunchLens Team</p>
  </div>
</body>
</html>
