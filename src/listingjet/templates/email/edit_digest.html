<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1E293B;">
  <div style="background: #0F1B2D; color: white; padding: 24px; border-radius: 8px 8px 0 0; text-align: center;">
    <h1 style="margin: 0; font-size: 24px;">Listing Activity Summary</h1>
  </div>
  <div style="background: #F8FAFC; padding: 24px; border: 1px solid #E2E8F0; border-top: none; border-radius: 0 0 8px 8px;">
    <p><strong>{{change_count}} changes</strong> were made to your shared listing yesterday:</p>
    <div style="background: white; border: 1px solid #E2E8F0; border-radius: 8px; padding: 16px; margin: 16px 0;">
      <p style="margin: 0; font-size: 18px; font-weight: 700;">{{listing_address}}</p>
      <p style="margin: 8px 0 0; color: #64748B; font-size: 14px;">Edited by: {{editor_names}}</p>
    </div>
    <div style="text-align: center; margin: 24px 0;">
      <a href="https://app.listingjet.com/listings"
         style="background: #F97316; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600;">
        View Activity
      </a>
    </div>
    <p style="color: #94A3B8; font-size: 12px; margin-top: 24px;">— The ListingJet Team</p>
  </div>
</body>
</html>
