name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: listingjet-api
  ECR_REPO_WORKER: listingjet-worker
  ECS_CLUSTER: listingjet
  ECS_SERVICE_API: listingjet-api
  ECS_SERVICE_WORKER: listingjet-worker

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: listingjet
          POSTGRES_PASSWORD: password
          POSTGRES_DB: listingjet_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://listingjet:password@localhost:5433/listingjet_test"
      DATABASE_URL_SYNC: "postgresql://listingjet:password@localhost:5433/listingjet_test"
      JWT_SECRET: "test-secret-that-is-at-least-32-characters-long"
      REDIS_URL: "redis://localhost:6379/0"
      USE_MOCK_PROVIDERS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m alembic upgrade head
      - run: python -m pytest --tb=short -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_API:$IMAGE_TAG -t $REGISTRY/$ECR_REPO_API:latest .
          docker push $REGISTRY/$ECR_REPO_API:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO_API:latest

      - name: Run migrations
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition listingjet-migrate \
            --launch-type FARGATE \
            --network-configuration "$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE_API --query 'services[0].networkConfiguration' --output json)" \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["python","-m","alembic","upgrade","head"]}]}'

      - name: Deploy API service
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_API --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_WORKER --force-new-deployment

      - name: Notify Sentry
        if: always()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          curl -sL https://sentry.io/api/0/organizations/${{ secrets.SENTRY_ORG }}/releases/ \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"version":"${{ github.sha }}","projects":["listingjet"]}' || true
