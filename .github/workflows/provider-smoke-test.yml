name: Provider Smoke Test

# Weekly smoke test that makes real API calls to Qwen and Gemma to catch
# upstream breakage (endpoint changes, model deprecations, auth regressions).
# Also runnable on-demand via workflow_dispatch.

on:
  schedule:
    - cron: "0 13 * * 1"  # Mondays 13:00 UTC
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-asyncio httpx

      - name: Run Qwen smoke test
        if: env.QWEN_API_KEY != ''
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DATABASE_URL: postgresql://unused@localhost/unused
          JWT_SECRET: smoketest-secret-at-least-32-characters-long
          USE_MOCK_PROVIDERS: "false"
          RUN_LIVE_SMOKE: "true"
          ANTHROPIC_API_KEY: "unused"
          GOOGLE_VISION_API_KEY: "unused"
        run: |
          pytest tests/smoke/test_providers_live.py::test_qwen_complete_live -v
          pytest tests/smoke/test_providers_live.py::test_qwen_vision_live -v

      - name: Run Gemma smoke test
        if: env.GEMINI_API_KEY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://unused@localhost/unused
          JWT_SECRET: smoketest-secret-at-least-32-characters-long
          USE_MOCK_PROVIDERS: "false"
          RUN_LIVE_SMOKE: "true"
          ANTHROPIC_API_KEY: "unused"
          GOOGLE_VISION_API_KEY: "unused"
        run: |
          pytest tests/smoke/test_providers_live.py::test_gemma_complete_live -v
          pytest tests/smoke/test_providers_live.py::test_gemma_vision_live -v

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Provider smoke test failed. Check upstream API changes."
