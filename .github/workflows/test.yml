name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: listingjet
          POSTGRES_PASSWORD: password
          POSTGRES_DB: listingjet_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U listingjet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      postgres-dev:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: listingjet
          POSTGRES_PASSWORD: password
          POSTGRES_DB: listingjet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U listingjet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://listingjet:password@localhost:5432/listingjet
      DATABASE_URL_SYNC: postgresql://listingjet:password@localhost:5432/listingjet
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      REDIS_URL: redis://localhost:6379/0
      USE_MOCK_PROVIDERS: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations (dev DB)
        run: alembic upgrade head

      - name: Run Alembic migrations (test DB)
        env:
          DATABASE_URL_SYNC: postgresql://listingjet:password@localhost:5433/listingjet_test
          DATABASE_URL: postgresql+asyncpg://listingjet:password@localhost:5433/listingjet_test
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short -q --timeout=30
