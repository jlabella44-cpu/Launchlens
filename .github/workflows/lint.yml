name: Lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: |
          ruff --version
          ruff check src/ tests/ || (echo "--- Ruff failed, showing details ---" && ruff check src/ tests/ --output-format=text 2>&1; exit 1)
