name: Lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: |
          ruff --version
          ruff check src/ tests/ --output-format=full 2>&1 | tee /tmp/ruff-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload ruff output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: /tmp/ruff-output.txt
