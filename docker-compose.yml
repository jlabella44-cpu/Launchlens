services:
  # ── PostgreSQL (dev) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: launchlens
      POSTGRES_PASSWORD: password
      POSTGRES_DB: launchlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (test — port 5433 for backward compat) ───────
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: launchlens
      POSTGRES_PASSWORD: password
      POSTGRES_DB: launchlens_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Temporal ─────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=launchlens
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Temporal UI ──────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  # ── ClamAV (virus scanning) ───────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav

  # ── Jaeger (OpenTelemetry traces) ────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ── LaunchLens API ───────────────────────────────────────────
  api:
    build: .
    command: api
    environment:
      - DATABASE_URL=postgresql+asyncpg://launchlens:password@postgres:5432/launchlens
      - DATABASE_URL_SYNC=postgresql://launchlens:password@postgres:5432/launchlens
      - JWT_SECRET=docker-dev-secret-change-in-production-xxxxx
      - TEMPORAL_HOST=temporal:7233
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - USE_MOCK_PROVIDERS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

  # ── LaunchLens Temporal Worker ───────────────────────────────
  worker:
    build: .
    command: worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://launchlens:password@postgres:5432/launchlens
      - DATABASE_URL_SYNC=postgresql://launchlens:password@postgres:5432/launchlens
      - JWT_SECRET=docker-dev-secret-change-in-production-xxxxx
      - TEMPORAL_HOST=temporal:7233
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - USE_MOCK_PROVIDERS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

volumes:
  pgdata:
  pgdata_test:
  clamav_data:
