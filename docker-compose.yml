services:
  # ── PostgreSQL (dev) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listingjet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: listingjet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listingjet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (test — port 5433 for backward compat) ───────
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listingjet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: listingjet_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listingjet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PgBouncer (connection pooler) ─────────────────────────────
  # Required for serverless deployments where connection counts spike.
  # Sits between the app and Postgres in transaction-pool mode.
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    environment:
      DATABASE_URL: postgresql://listingjet:password@postgres:5432/listingjet
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Temporal ─────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=listingjet
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Temporal UI ──────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  # ── ClamAV (virus scanning) ───────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav

  # ── Jaeger (OpenTelemetry traces) ────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.53
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ── ListingJet API ───────────────────────────────────────────
  api:
    build: .
    command: api
    environment:
      - DATABASE_URL=postgresql+asyncpg://listingjet:password@postgres:5432/listingjet
      - DATABASE_URL_SYNC=postgresql://listingjet:password@postgres:5432/listingjet
      - JWT_SECRET=docker-dev-secret-change-in-production-xxxxx
      - TEMPORAL_HOST=temporal:7233
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - USE_MOCK_PROVIDERS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

  # ── ListingJet Temporal Worker ───────────────────────────────
  worker:
    build: .
    command: worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://listingjet:password@postgres:5432/listingjet
      - DATABASE_URL_SYNC=postgresql://listingjet:password@postgres:5432/listingjet
      - JWT_SECRET=docker-dev-secret-change-in-production-xxxxx
      - TEMPORAL_HOST=temporal:7233
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - USE_MOCK_PROVIDERS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

volumes:
  pgdata:
  pgdata_test:
  clamav_data:
